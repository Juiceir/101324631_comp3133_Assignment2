<div class="login-container">
  <h1>Employee Management</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email or Username</mat-label>
      <input matInput formControlName="usernameOrEmail" />
      <mat-error *ngIf="form.get('usernameOrEmail')?.invalid && form.get('usernameOrEmail')?.touched">
        Username or Email is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-error *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
        Password is required
      </mat-error>
    </mat-form-field>

    <div class="error" *ngIf="error">
      {{ error }}
    </div>

    <button mat-raised-button color="primary" class="full-width" type="submit">
      Login
    </button>

    <div class="signup-link">
      <a routerLink="/signup">Create an account</a>
    </div>

  </form>
</div>
